# fly.toml app configuration file generated for smart-apply-api on 2026-05-02T16:27:41+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'smart-apply-api'
primary_region = 'fra'

[build]
  dockerfile = 'infra/Dockerfile'

# Release command runs ONCE per deploy in a temporary one-off VM (uses
# all the same env vars + secrets as a regular machine) BEFORE the new
# app machines start serving traffic. If this exits non-zero the deploy
# aborts and the previous version keeps running.
#
# `prisma migrate deploy` is the production-safe migration runner — only
# applies migrations already committed to apps/api/prisma/migrations,
# never generates new ones, never prompts. Idempotent: a no-op when the
# DB is already at HEAD.
#
# Implementation notes:
# - We invoke the prisma JS entrypoint directly via `node` rather than the
#   `node_modules/.bin/prisma` symlink. The official node:24-alpine
# Notes on the release_command shell pipeline:
# - We deliberately bypass prisma.config.ts (which prefers DIRECT_URL via
#   tsx-loaded TypeScript). On Node 25 the tsx loader has surfaced silent
#   failures: the config 'loads' but `process.env.DIRECT_URL` is read as
#   undefined inside it, so Prisma falls back to schema.prisma's
#   env("DATABASE_URL") = the pooled hostname → P1002 advisory_lock
#   timeout. Setting DATABASE_URL=$DIRECT_URL in the release shell makes
#   schema.prisma's env() resolve directly to the unpooled hostname and
#   removes the prisma.config.ts dependency entirely from migrations.
# - The `[ -z "$DIRECT_URL" ]` guard fails the deploy with a clear
#   message instead of silently falling back to the pooled URL.
# - `prisma` and `tsx` are runtime dependencies in apps/api/package.json
#   so they survive `npm prune --production` in the Docker build.
# - Going directly to `node node_modules/prisma/build/index.js` sidesteps
#   docker-entrypoint.sh's bin-resolution (npm workspaces put the actual
#   prisma binary under apps/api/node_modules/.bin/, not the root .bin/).
[deploy]
  release_command = '''sh -c 'if [ -z "$DIRECT_URL" ]; then echo "[release] FATAL: DIRECT_URL secret not set on this machine." >&2; exit 1; fi; DATABASE_URL="$DIRECT_URL" exec node apps/api/node_modules/prisma/build/index.js migrate deploy --schema=apps/api/prisma/schema.prisma' '''

[env]
  # Public origin of THIS API. Drives OAuth callback URLs and the
  # Microsoft Graph push-notification webhook URL (mailbox-sync). Without
  # this, the API falls back to http://localhost:3000 — which Graph cannot
  # reach → subscription creation fails on every Outlook connect.
  API_BASE_URL = 'https://api.smart-apply.io'
  JOBS_DRIVER = 'qstash'
  LLM_PROVIDER = 'azure-openai'
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'
  PORT = '3000'
  STORAGE_DRIVER = 'r2'
  THROTTLER_STORAGE = 'upstash'

[processes]
  app = ''

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  # Keep BOTH machines warm. With min_machines_running = 1 Fly would suspend
  # the second machine on idle, defeating the redundancy point. Two warm
  # workers are also needed because the agent URL parser is single-flight per
  # process — the second machine absorbs concurrent parses instead of queueing.
  min_machines_running = 2
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'get'
    path = '/api/v1/health'

# VM size: shared-cpu-2x · 2 GB RAM. Required because each app process can
# launch a Playwright Chromium for the agent URL parser. On the previous
# shared-cpu-1x / 1 GB combo a single LinkedIn parse reliably OOM-killed the
# worker (kernel SIGKILL → Fly edge returns 502 with no CORS headers,
# surfacing as a "CORS error" in browsers).
[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
