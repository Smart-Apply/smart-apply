# fly.toml app configuration file generated for smart-apply-api on 2026-05-02T16:27:41+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'smart-apply-api'
primary_region = 'fra'

[build]
  dockerfile = 'infra/Dockerfile'

# Release command runs ONCE per deploy in a temporary one-off VM (uses
# all the same env vars + secrets as a regular machine) BEFORE the new
# app machines start serving traffic. If this exits non-zero the deploy
# aborts and the previous version keeps running.
#
# `prisma migrate deploy` is the production-safe migration runner — only
# applies migrations already committed to apps/api/prisma/migrations,
# never generates new ones, never prompts. Idempotent: a no-op when the
# DB is already at HEAD.
#
# Implementation notes:
# - We invoke the prisma JS entrypoint directly via `node` rather than the
#   `node_modules/.bin/prisma` symlink. The official node:24-alpine
#   docker-entrypoint.sh auto-prepends `node` to the release command when
#   it doesn't recognize an executable, then tries to `require()` the bin
#   wrapper — which fails because npm workspaces put the actual bin
#   under apps/api/node_modules/.bin/ rather than the root .bin/. Going
#   directly to `node node_modules/prisma/build/index.js` sidesteps the
#   bin-resolution layer entirely.
# - `prisma` and `tsx` are runtime dependencies in apps/api/package.json
#   so they survive `npm prune --production` in the Docker build. `tsx`
#   is required by the Prisma CLI to load prisma.config.ts (TypeScript).
# - prisma.config.ts prefers DIRECT_URL over DATABASE_URL, which is the
#   correct path for migrations against Neon's pgbouncer.
[deploy]
  release_command = 'node apps/api/node_modules/prisma/build/index.js migrate deploy --schema=apps/api/prisma/schema.prisma'

[env]
  JOBS_DRIVER = 'qstash'
  LLM_PROVIDER = 'azure-openai'
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'
  PORT = '3000'
  PUPPETEER_EXECUTABLE_PATH = '/usr/bin/chromium-browser'
  PUPPETEER_IDLE_TIMEOUT_MS = '60000'
  PUPPETEER_MAX_BROWSERS = '2'
  PUPPETEER_MIN_BROWSERS = '0'
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = 'true'
  STORAGE_DRIVER = 'r2'
  THROTTLER_STORAGE = 'upstash'

[processes]
  app = ''

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  # Keep BOTH machines warm. With min_machines_running = 1 Fly would suspend
  # the second machine on idle, defeating the redundancy point. Two warm
  # workers are also needed because the agent URL parser is single-flight per
  # process — the second machine absorbs concurrent parses instead of queueing.
  min_machines_running = 2
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'get'
    path = '/api/v1/health'

# VM size: shared-cpu-2x · 2 GB RAM. Required because each app process can
# hold a Puppeteer browser pool (max 2 browsers) PLUS launch a Playwright
# Chromium for the agent URL parser. On the previous shared-cpu-1x / 1 GB
# combo a single LinkedIn parse reliably OOM-killed the worker (kernel
# SIGKILL → Fly edge returns 502 with no CORS headers, surfacing as a
# "CORS error" in browsers).
[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
