name: CI

# Runs on every pull request targeting main. Catches lint errors, broken
# unit tests, and out-of-sync lockfiles BEFORE they can be merged.
#
# This file is intentionally minimal — heavy integration / e2e tests
# require a real Postgres + Redis and are run elsewhere (or before
# release). The goal here is "fast enough that nobody bypasses it."

on:
  pull_request:
    branches: [main]
  # Manual trigger lets you re-run checks on demand without pushing.
  workflow_dispatch:

# Cancel in-flight runs on the same PR when a new commit is pushed.
# Saves CI minutes and avoids confusing "out of date" status checks.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level default permissions. Individual jobs can override / narrow
# these. `pull-requests: read` is required by dorny/paths-filter to fetch
# the list of changed files from the GitHub API on PR events.
permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # lint-and-typecheck — fast feedback on style/type errors.
  # No DB needed, runs in <2 min.
  # ─────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify lockfile is in sync with package.json files
        # If a contributor edited package.json without running `pnpm install`,
        # `pnpm install --frozen-lockfile` itself would fail — we check this
        # explicitly to surface a clearer error message and to also catch
        # `--no-frozen-lockfile` drift on local-only manifest tweaks.
        #
        # Strategy: re-resolve the lockfile from the manifests in-place and
        # diff against the committed pnpm-lock.yaml. Any change at all means
        # someone touched a manifest without re-running pnpm install.
        run: |
          pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts
          if git diff --quiet pnpm-lock.yaml; then
            echo "✅ Lockfile in sync"
            exit 0
          fi

          echo "::error::pnpm-lock.yaml is out of sync with package.json. Run 'pnpm install' locally, commit, and push."
          git --no-pager diff pnpm-lock.yaml | head -80
          exit 1

      - name: Build shared package (required by api + web)
        run: pnpm shared:build

      - name: Lint
        run: pnpm lint

  # ─────────────────────────────────────────────────────────────────────
  # unit-tests — backend unit tests (no DB, no external services).
  #
  # ⚠️  Currently NON-BLOCKING (continue-on-error: true).
  #
  # The existing test suite was written against an older version of the
  # codebase and hasn't been kept in sync. Failures here are noise, not
  # signal — blocking PRs on them would just train you to ignore CI.
  #
  # The job still runs so:
  #   1. You see the failure list as a reminder of test-suite debt
  #   2. When you do refresh the suite, you can flip the flag back to
  #      blocking by removing `continue-on-error: true`
  #
  # TODO: rewrite the unit suite, then remove `continue-on-error`.
  # ─────────────────────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm shared:build

      - name: Run unit tests
        run: pnpm test:unit

  # ─────────────────────────────────────────────────────────────────────
  # migration-check — dry-run new Prisma migrations against an ephemeral
  # Neon branch. Catches:
  #   - Syntax errors in migration SQL
  #   - Migrations that fail against the staging schema (e.g. ALTER on a
  #     column that was already dropped by a teammate's earlier merge)
  #   - Migrations that take too long to apply (we'll see it here, not in
  #     the staging Fly release-command timeout)
  #
  # The branch is created off the staging Neon branch (so the schema mirrors
  # what's about to receive the migration on the next staging deploy), and
  # auto-deleted when the PR closes.
  #
  # Only runs when the PR actually changes Prisma migrations or the schema
  # — saves CI minutes on docs/UI-only PRs.
  #
  # Required GitHub secrets (org-level recommended):
  #   NEON_API_KEY   — https://console.neon.tech/app/settings/api-keys
  # Required GitHub variables (repo-level):
  #   NEON_PROJECT_ID — the project containing main + staging branches
  # ─────────────────────────────────────────────────────────────────────
  detect-migration-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            migrations:
              - 'apps/api/prisma/schema.prisma'
              - 'apps/api/prisma/migrations/**'

  migration-check:
    needs: detect-migration-changes
    if: needs.detect-migration-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # allow posting a status comment on the PR
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        # Only need the api workspace + shared for prisma to load.
        run: pnpm install --frozen-lockfile --filter @smart-apply/api... --filter @smart-apply/shared...

      - name: Build shared package
        run: pnpm shared:build

      # Create an ephemeral Neon branch off `staging`. Branch name is
      # deterministic per PR (pr-1234) so re-runs reuse the same branch
      # — Neon dedupes by name and just resets it to a fresh COW snapshot.
      # `expires_at` is a safety net: even if the delete-branch step fails
      # (cancelled job, GitHub outage), Neon will auto-delete after 7 days.
      - name: Compute branch expiration (7 days from now)
        id: expiration
        run: echo "EXPIRES_AT=$(date -u --date '+7 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Create ephemeral Neon branch
        id: neon-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          parent_branch: staging
          branch_name: pr-${{ github.event.pull_request.number }}
          expires_at: ${{ steps.expiration.outputs.EXPIRES_AT }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Apply pending migrations to ephemeral branch
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_pooled }}
          DIRECT_URL: ${{ steps.neon-branch.outputs.db_url }}
        # `prisma migrate deploy` is the same command Fly's release_command
        # runs on actual deploys. If it succeeds here, it will succeed there.
        run: |
          cd apps/api
          echo "::group::Migration plan"
          npx prisma migrate status
          echo "::endgroup::"

          echo "::group::Applying migrations"
          npx prisma migrate deploy
          echo "::endgroup::"

      # Drift check: after applying migrations, the live schema should match
      # what schema.prisma declares. If `migrate diff` finds anything, someone
      # edited schema.prisma without generating a migration.
      - name: Verify no schema drift
        env:
          DIRECT_URL: ${{ steps.neon-branch.outputs.db_url }}
        run: |
          cd apps/api
          if ! npx prisma migrate diff \
            --from-url "$DIRECT_URL" \
            --to-schema-datamodel prisma/schema.prisma \
            --exit-code; then
            echo "::error::schema.prisma diverges from the migrated DB state. Run 'npx prisma migrate dev --name <descriptive_name>' to generate the missing migration."
            exit 1
          fi
          echo "✅ Schema matches migrations"

      # Always delete the ephemeral branch, even on failure, to keep Neon
      # branch count under the plan limit.
      - name: Delete ephemeral Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
