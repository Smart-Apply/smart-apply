name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  # Allow manual triggers from the Actions tab. workflow_dispatch will run
  # both deploy paths regardless of which files changed (useful for
  # cache-bust redeploys).
  workflow_dispatch:

# Concurrency is scoped per deploy target so a frontend deploy doesn't
# block a backend deploy and vice versa.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Override these via Repository Variables (Settings → Secrets and variables → Actions → Variables):
  #   VM_HOST          — SSH target. Cloudflare cannot proxy SSH, so this stays
  #                      pointed at the Azure FQDN even after domain cutover.
  #   PUBLIC_API_URL   — baked into the CF Worker bundle at build time. Switch
  #                      from the Azure FQDN to https://api.smart-apply.io/api/v1
  #                      to migrate.
  #   CSP_API_ORIGINS  — (currently unused — VM web container disabled, see
  #                      docker-compose.prod.yml. Kept here for the rollback
  #                      path that re-enables the VM web fallback.)
  #   HEALTH_CHECK_HOST— hostname used for the post-deploy curl health check.
  VM_HOST: ${{ vars.VM_HOST || 'smartapplymvp.swedencentral.cloudapp.azure.com' }}
  HEALTH_CHECK_HOST: ${{ vars.HEALTH_CHECK_HOST || 'smartapplymvp.swedencentral.cloudapp.azure.com' }}
  PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || 'https://api.smart-apply.io/api/v1' }}
  VM_USER: azureuser
  APP_DIR: /home/azureuser/smart-apply
  REGISTRY: ghcr.io
  # Lowercase owner name for Docker compatibility
  IMAGE_OWNER: ar1anit
  API_IMAGE: ghcr.io/ar1anit/smartapply-api

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # detect-changes — figure out which deploy targets need to run.
  # Splits frontend (CF Worker) from backend (API on VM) so a backend-only
  # change doesn't redeploy the frontend, halving CI time and avoiding
  # unnecessary Worker version bumps.
  # ─────────────────────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # workflow_dispatch should rebuild both regardless of changed paths.
          # On `push`, we filter so a docs/api-only change doesn't redeploy
          # the frontend (and vice versa). The shared paths (root configs,
          # workflow file itself, packages/shared) trigger BOTH so a refactor
          # that touches both halves doesn't get half-deployed.
          #
          # Quantifier left at the default ('some') — a filter matches if
          # ANY listed pattern matches a changed file. The previous 'every'
          # value silently broke deploys: a single file can't match
          # `apps/web/**` AND `packages/shared/**` AND `package.json`
          # simultaneously, so both filters always evaluated to false.
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'infra/Dockerfile'
              - 'infra/docker-compose.prod.yml'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy-vm.yml'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy-vm.yml'

  # ─────────────────────────────────────────────────────────────────────
  # build-api — Build + push the API Docker image to GHCR.
  # ─────────────────────────────────────────────────────────────────────
  build-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.API_IMAGE }}:buildcache,mode=max

  # ─────────────────────────────────────────────────────────────────────
  # deploy-api — Pull the API image to the VM, restart compose stack.
  # ─────────────────────────────────────────────────────────────────────
  deploy-api:
    needs: build-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e

            cd /home/azureuser/smart-apply

            # Pull latest code (docker-compose.prod.yml + nginx configs)
            echo "📦 Syncing code..."
            git fetch origin main --depth=1
            git reset --hard origin/main

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest API image (web image is no longer built — frontend
            # ships via Cloudflare Workers; see deploy-web job below)
            echo "📦 Pulling API image..."
            docker pull ${{ env.API_IMAGE }}:latest

            # Tag for local use (docker-compose.prod.yml references smartapply-api:latest)
            docker tag ${{ env.API_IMAGE }}:latest smartapply-api:latest

            # Stop PM2 if running (cleanup from old setup)
            pm2 delete all 2>/dev/null || true
            pm2 save --force 2>/dev/null || true

            # Recreate just the api container — leaves db running, no web container exists
            echo "🚀 Restarting API container..."
            docker-compose -f infra/docker-compose.prod.yml up -d --force-recreate api || {
              echo "❌ Docker Compose failed to start API"
              docker-compose -f infra/docker-compose.prod.yml logs --tail 100 api
              docker-compose -f infra/docker-compose.prod.yml ps -a
              exit 1
            }

            # Wait for container to be healthy
            echo "⏳ Waiting for API to be healthy..."
            sleep 10

            echo "📊 Container status:"
            docker-compose -f infra/docker-compose.prod.yml ps

            # Run database migrations (idempotent — Prisma db push)
            echo "🗃️ Running migrations..."
            docker-compose -f infra/docker-compose.prod.yml exec -T api npx prisma db push --schema=./apps/api/prisma/schema.prisma --accept-data-loss 2>/dev/null || \
              echo "⚠️ Migration skipped or already up to date"

            # Seed templates (idempotent — upserts)
            echo "🎨 Seeding templates..."
            docker-compose -f infra/docker-compose.prod.yml exec -T api node apps/api/prisma/dist/seed-templates-autodiscover.js || \
              echo "⚠️ Template seeding skipped or failed"

            # Cleanup old images
            docker image prune -f 2>/dev/null || true

            echo "✅ API deployment complete!"

      - name: Health Check
        run: |
          echo "⏳ Verifying external health at ${{ env.HEALTH_CHECK_HOST }}..."
          sleep 5
          for i in {1..6}; do
            if curl -sf --max-time 10 https://${{ env.HEALTH_CHECK_HOST }}/api/v1/health; then
              echo -e "\n✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i/6 - waiting 5s..."
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1

      - name: Show logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "=== Docker Images ==="
            docker images | grep -E "smartapply|ghcr" || echo "No relevant images found"
            echo ""
            echo "=== Docker Compose Status ==="
            docker-compose -f /home/azureuser/smart-apply/infra/docker-compose.prod.yml ps -a 2>&1 || echo "No compose services"
            echo ""
            echo "=== API Container Logs ==="
            docker logs --tail 100 smartapply-api 2>&1 || true
            echo ""
            echo "=== nginx Status ==="
            sudo systemctl status nginx --no-pager 2>&1 || true

  # ─────────────────────────────────────────────────────────────────────
  # deploy-web — Build + deploy the Cloudflare Worker (OpenNext).
  # Independent of the API deploy: runs in parallel and on its own change
  # filter (apps/web/**). Replaces the old VM-web Docker image build that
  # was deploying to a container we no longer run.
  #
  # Required secrets:
  #   CLOUDFLARE_API_TOKEN — Wrangler API token with Workers:Edit perms
  #                          (https://dash.cloudflare.com/profile/api-tokens)
  #
  # The TURNSTILE_SITE_KEY default is hardcoded in apps/web/package.json's
  # cf:build script (it's a public key by Cloudflare's design — the secret
  # half lives on the API). Override here only if you ever need staging vs.
  # prod with different widgets.
  # ─────────────────────────────────────────────────────────────────────
  deploy-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root + web + shared workspaces)
        # `--include=dev` because the build needs Next/OpenNext/Wrangler which
        # are devDependencies. Web workspace pulls shared via local symlink.
        run: npm ci --workspace=apps/web --workspace=packages/shared --include=dev --legacy-peer-deps

      - name: Build shared package
        run: npm run shared:build

      - name: Build + deploy Cloudflare Worker
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Override the package.json defaults via repo vars/secrets.
          # All NEXT_PUBLIC_* are inlined at build time and shipped to the
          # browser, so site keys and DSNs are public by design.
          NEXT_PUBLIC_API_URL: ${{ env.PUBLIC_API_URL }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_WEB }}
          NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
        run: npm run cf:deploy

      - name: Smoke test deployed Worker
        run: |
          echo "⏳ Verifying https://smart-apply.io/register loads..."
          sleep 5
          for i in {1..6}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://smart-apply.io/register)
            if [ "$code" = "200" ]; then
              echo "✅ /register returned 200"
              exit 0
            fi
            echo "Attempt $i/6 - got $code, waiting 5s..."
            sleep 5
          done
          echo "❌ /register did not return 200"
          exit 1

