name: Deploy to Azure VM

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

# Only allow one deployment at a time
concurrency:
  group: deployment
  cancel-in-progress: false

env:
  VM_HOST: smartapplymvp.swedencentral.cloudapp.azure.com
  VM_USER: azureuser
  APP_DIR: /home/azureuser/smart-apply
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/smartapply-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/smartapply-web

jobs:
  # Build Docker images with caching
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "date_tag=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.API_IMAGE }}:buildcache,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://smartapplymvp.swedencentral.cloudapp.azure.com/api/v1
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.WEB_IMAGE }}:buildcache,mode=max

  # Deploy from registry to VM
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            
            cd /home/azureuser/smart-apply
            
            # Pull latest code (for docker-compose.prod.yml)
            echo "📦 Syncing code..."
            git fetch origin main --depth=1
            git reset --hard origin/main
            
            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images from registry
            echo "📦 Pulling Docker images..."
            docker pull ${{ env.API_IMAGE }}:latest
            docker pull ${{ env.WEB_IMAGE }}:latest
            
            # Tag images for local use
            docker tag ${{ env.API_IMAGE }}:latest smartapply-api:latest
            docker tag ${{ env.WEB_IMAGE }}:latest smartapply-web:latest
            
            # Stop PM2 if running (cleanup from old setup)
            pm2 delete all 2>/dev/null || true
            pm2 save --force 2>/dev/null || true
            
            # Stop existing containers
            docker compose -f infra/docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            
            # Start services with Docker Compose
            echo "🚀 Starting services..."
            docker compose -f infra/docker-compose.prod.yml up -d
            
            # Wait for API to be healthy
            echo "⏳ Waiting for API to be healthy..."
            for i in {1..30}; do
              if docker compose -f infra/docker-compose.prod.yml exec -T api wget -q --spider http://localhost:3000/api/v1/health 2>/dev/null; then
                echo "✅ API is healthy!"
                break
              fi
              echo "  Waiting... ($i/30)"
              sleep 2
            done
            
            # Run database migrations
            echo "🗃️ Running migrations..."
            docker compose -f infra/docker-compose.prod.yml exec -T api npx prisma db push --skip-generate --accept-data-loss 2>/dev/null || \
              docker compose -f infra/docker-compose.prod.yml exec -T api npx prisma db push --skip-generate
            
            # Show status
            echo ""
            echo "📊 Container status:"
            docker compose -f infra/docker-compose.prod.yml ps
            
            # Cleanup old images
            docker image prune -f 2>/dev/null || true
            
            echo ""
            echo "✅ Deployment complete!"

      - name: Health Check
        run: |
          echo "⏳ Verifying external health..."
          sleep 5
          for i in {1..6}; do
            if curl -sf --max-time 10 https://${{ env.VM_HOST }}/api/v1/health; then
              echo -e "\n✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i/6 - waiting 5s..."
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1

      - name: Show logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "=== API Logs ==="
            docker logs smartapply-api --tail 50 2>&1 || true
            echo ""
            echo "=== Web Logs ==="
            docker logs smartapply-web --tail 50 2>&1 || true
