name: Deploy to Azure VM

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  # Allow manual triggers from the Actions tab
  workflow_dispatch:

# Only allow one deployment at a time
concurrency:
  group: deployment
  cancel-in-progress: false

env:
  # Override these via Repository Variables (Settings → Secrets and variables → Actions → Variables):
  #   VM_HOST          — SSH target. Cloudflare cannot proxy SSH, so this stays
  #                      pointed at the Azure FQDN even after domain cutover.
  #   PUBLIC_API_URL   — baked into the web image at build time. Switch from
  #                      the Azure FQDN to https://api.smart-apply.io/api/v1
  #                      to migrate.
  #   HEALTH_CHECK_HOST— hostname used for the post-deploy curl health check.
  VM_HOST: ${{ vars.VM_HOST || 'smartapplymvp.swedencentral.cloudapp.azure.com' }}
  HEALTH_CHECK_HOST: ${{ vars.HEALTH_CHECK_HOST || 'smartapplymvp.swedencentral.cloudapp.azure.com' }}
  PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || 'https://smartapplymvp.swedencentral.cloudapp.azure.com/api/v1' }}
  VM_USER: azureuser
  APP_DIR: /home/azureuser/smart-apply
  REGISTRY: ghcr.io
  # Lowercase owner name for Docker compatibility
  IMAGE_OWNER: ar1anit
  API_IMAGE: ghcr.io/ar1anit/smartapply-api
  WEB_IMAGE: ghcr.io/ar1anit/smartapply-web

jobs:
  # Build Docker images with caching
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "date_tag=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.API_IMAGE }}:buildcache,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.PUBLIC_API_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.SENTRY_DSN_WEB }}
            NEXT_PUBLIC_SENTRY_RELEASE=${{ steps.meta.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.WEB_IMAGE }}:buildcache,mode=max

  # Deploy from registry to VM
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            
            cd /home/azureuser/smart-apply
            
            # Pull latest code (for docker-compose.prod.yml)
            echo "📦 Syncing code..."
            git fetch origin main --depth=1
            git reset --hard origin/main
            
            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images from registry
            echo "📦 Pulling Docker images..."
            docker pull ${{ env.API_IMAGE }}:latest
            docker pull ${{ env.WEB_IMAGE }}:latest
            
            # Tag images for local use
            docker tag ${{ env.API_IMAGE }}:latest smartapply-api:latest
            docker tag ${{ env.WEB_IMAGE }}:latest smartapply-web:latest
            
            # Stop PM2 if running (cleanup from old setup)
            pm2 delete all 2>/dev/null || true
            pm2 save --force 2>/dev/null || true
            
            # Stop existing containers
            docker-compose -f infra/docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            
            # Verify images are tagged correctly
            echo "📋 Available images:"
            docker images | grep smartapply || echo "No smartapply images found"
            
            # Start services with Docker Compose
            echo "🚀 Starting services..."
            docker-compose -f infra/docker-compose.prod.yml up -d || {
              echo "❌ Docker Compose failed to start services"
              echo "=== Docker Compose Logs ==="
              docker-compose -f infra/docker-compose.prod.yml logs --tail 100
              echo "=== Container Status ==="
              docker-compose -f infra/docker-compose.prod.yml ps -a
              exit 1
            }
            
            # Wait for containers to be healthy
            echo "⏳ Waiting for services to be healthy..."
            sleep 10
            
            # Verify containers are running
            echo "📊 Container status after start:"
            docker-compose -f infra/docker-compose.prod.yml ps
            
            # Run database migrations (skip if fails - schema might already be up to date)
            echo "🗃️ Running migrations..."
            docker-compose -f infra/docker-compose.prod.yml exec -T api npx prisma db push --schema=./apps/api/prisma/schema.prisma --accept-data-loss 2>/dev/null || \
              echo "⚠️ Migration skipped or already up to date"
            
            # Seed templates from autodiscover script (idempotent - upserts templates)
            echo "🎨 Seeding templates..."
            docker-compose -f infra/docker-compose.prod.yml exec -T api node apps/api/prisma/dist/seed-templates-autodiscover.js || \
              echo "⚠️ Template seeding skipped or failed"
            
            # Show status
            echo ""
            echo "📊 Container status:"
            docker-compose -f infra/docker-compose.prod.yml ps
            
            # Cleanup old images
            docker image prune -f 2>/dev/null || true
            
            echo ""
            echo "✅ Deployment complete!"

      - name: Health Check
        run: |
          echo "⏳ Verifying external health at ${{ env.HEALTH_CHECK_HOST }}..."
          sleep 5
          for i in {1..6}; do
            if curl -sf --max-time 10 https://${{ env.HEALTH_CHECK_HOST }}/api/v1/health; then
              echo -e "\n✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i/6 - waiting 5s..."
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1

      - name: Show logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "=== Docker Images ==="
            docker images | grep -E "smartapply|ghcr" || echo "No relevant images found"
            echo ""
            echo "=== Docker Compose Status ==="
            docker-compose -f /home/azureuser/smart-apply/infra/docker-compose.prod.yml ps -a 2>&1 || echo "No compose services"
            echo ""
            echo "=== Docker Compose Logs ==="
            docker-compose -f /home/azureuser/smart-apply/infra/docker-compose.prod.yml logs --tail 100 2>&1 || true
            echo ""
            echo "=== All Running Containers ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" 2>&1 || true
            echo ""
            echo "=== nginx Status ==="
            sudo systemctl status nginx --no-pager 2>&1 || true
