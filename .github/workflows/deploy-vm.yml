name: Deploy to Azure VM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

# Only allow one deployment at a time
concurrency:
  group: deployment
  cancel-in-progress: false

env:
  VM_HOST: smartapplymvp.swedencentral.cloudapp.azure.com
  VM_USER: azureuser
  APP_DIR: /home/azureuser/smart-apply

jobs:
  # Build and test first
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@smart-apply/shared

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web

  # Deploy only on push to main (not on PR)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          debug: true
          script: |
            set -ex
            
            echo "🔍 Debug info..."
            whoami
            pwd
            
            # Source Node.js (fnm) - try multiple locations
            export FNM_PATH="/home/azureuser/.local/share/fnm"
            if [ -d "$FNM_PATH" ]; then
              export PATH="$FNM_PATH:$PATH"
              eval "$(fnm env --shell bash)"
            elif [ -f "/home/azureuser/.bashrc" ]; then
              source /home/azureuser/.bashrc
            fi
            
            echo "Node version:"
            node -v || echo "Node not found!"
            echo "npm version:"
            npm -v || echo "npm not found!"
            
            echo "📦 Pulling latest code..."
            cd /home/azureuser/smart-apply
            git status
            git fetch origin main
            git reset --hard origin/main
            
            echo "📥 Installing dependencies..."
            npm ci
            
            echo "🔨 Building shared package..."
            npm run build --workspace=@smart-apply/shared
            
            echo "🔨 Building API..."
            npm run build --workspace=apps/api
            
            echo "🔨 Building Web..."
            npm run build --workspace=apps/web
            
            echo "🗃️ Running database migrations..."
            cd apps/api
            npx prisma generate
            npx prisma db push --skip-generate
            cd ../..
            
            echo "🔄 Restarting services..."
            pm2 restart all || pm2 start ecosystem.config.js
            
            echo "✅ Deployment complete!"
            pm2 status

      - name: Health Check
        run: |
          sleep 10
          curl -f https://${{ env.VM_HOST }}/api/v1/health || exit 1
          echo "✅ Health check passed!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed! Check the logs above."
