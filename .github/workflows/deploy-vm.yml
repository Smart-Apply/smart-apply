name: Deploy to Azure VM

on:
  push:
    branches: [main]

# Only allow one deployment at a time
concurrency:
  group: deployment
  cancel-in-progress: false

env:
  VM_HOST: smartapplymvp.swedencentral.cloudapp.azure.com
  VM_USER: azureuser
  APP_DIR: /home/azureuser/smart-apply

jobs:
  # Quick validation in CI (parallel with deploy)
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache node_modules directly
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Type check & Lint
        run: |
          npm run build --workspace=@smart-apply/shared
          cd apps/api && npx tsc --noEmit
          cd ../web && npm run lint

  # Deploy to VM (runs in parallel with validate)
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e
            
            # Setup Node.js
            export PATH="/home/azureuser/.local/share/fnm:$PATH"
            eval "$(/home/azureuser/.local/share/fnm/fnm env)"
            
            cd /home/azureuser/smart-apply
            
            # Pull latest code
            echo "📦 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            
            # Check if dependencies changed
            LOCK_HASH=$(md5sum package-lock.json | cut -d' ' -f1)
            CACHED_HASH=""
            if [ -f .npm-cache-hash ]; then
              CACHED_HASH=$(cat .npm-cache-hash)
            fi
            
            if [ "$LOCK_HASH" != "$CACHED_HASH" ]; then
              echo "📥 Dependencies changed, running npm ci..."
              npm ci
              echo "$LOCK_HASH" > .npm-cache-hash
            else
              echo "✅ Dependencies cached, skipping npm ci"
            fi
            
            # Build
            echo "🔨 Building..."
            npm run build --workspace=@smart-apply/shared
            npm run build --workspace=apps/api
            npm run build --workspace=apps/web
            
            # Setup Next.js standalone
            echo "📂 Copying static files..."
            cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/
            cp -r apps/web/public apps/web/.next/standalone/apps/web/
            
            # Database migrations
            echo "🗃️ Database migrations..."
            cd apps/api
            npx prisma generate
            npx prisma db push --skip-generate
            cd ../..
            
            # Restart services
            echo "🔄 Restarting services..."
            pm2 delete all 2>/dev/null || true
            pm2 start /home/azureuser/smart-apply/dist/apps/api/main.js --name "api" --cwd /home/azureuser/smart-apply/apps/api
            PORT=3001 pm2 start /home/azureuser/smart-apply/apps/web/.next/standalone/apps/web/server.js --name "web"
            pm2 save
            
            # Wait for API
            echo "⏳ Waiting for API..."
            sleep 10
            for i in {1..6}; do
              if curl -sf --max-time 5 http://localhost:3000/api/v1/health > /dev/null 2>&1; then
                echo "✅ API is healthy!"
                break
              fi
              sleep 5
            done
            
            pm2 status
            echo "✅ Deployment complete!"

      - name: Health Check (with retry)
        run: |
          echo "⏳ Verifying external health..."
          MAX_RETRIES=6
          RETRY_INTERVAL=10
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            if curl -sf --max-time 10 https://${{ env.VM_HOST }}/api/v1/health; then
              echo ""
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Service not ready, waiting ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed! Check the logs above."
