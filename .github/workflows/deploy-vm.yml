name: Deploy to Azure VM

on:
  push:
    branches: [main]

# Only allow one deployment at a time
concurrency:
  group: deployment
  cancel-in-progress: false

env:
  VM_HOST: smartapplymvp.swedencentral.cloudapp.azure.com
  VM_USER: azureuser
  APP_DIR: /home/azureuser/smart-apply

jobs:
  # Build once in CI, then deploy artifacts to VM
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache node_modules directly (faster than npm cache)
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      # Cache Turbo build artifacts
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Cache Next.js build
      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('apps/web/**/*.ts', 'apps/web/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build shared package
        run: npm run build --workspace=@smart-apply/shared

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web

      # Create deployment package (only built artifacts + production deps)
      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package
          
          # Copy built API
          cp -r dist deploy-package/
          cp -r apps/api/prisma deploy-package/prisma
          
          # Copy built Web (standalone)
          mkdir -p deploy-package/apps/web/.next
          cp -r apps/web/.next/standalone deploy-package/apps/web/.next/
          cp -r apps/web/.next/static deploy-package/apps/web/.next/
          cp -r apps/web/public deploy-package/apps/web/
          
          # Copy package files for production install
          cp package.json package-lock.json deploy-package/
          cp apps/api/package.json deploy-package/apps-api-package.json
          
          # Create tarball
          tar -czf deploy.tar.gz -C deploy-package .
          ls -lh deploy.tar.gz

      # Transfer deployment package using appleboy/scp-action
      - name: Transfer to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "/tmp"

      # Deploy on VM
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            cd /home/azureuser/smart-apply
            
            # Extract new build
            echo "📂 Extracting deployment package..."
            tar -xzf /tmp/deploy.tar.gz -C /home/azureuser/smart-apply --overwrite
            rm /tmp/deploy.tar.gz
            
            # Setup static files for Next.js standalone
            mkdir -p apps/web/.next/standalone/apps/web/.next
            cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/
            cp -r apps/web/public apps/web/.next/standalone/apps/web/
            
            # Install production dependencies only (much faster)
            echo "📥 Installing production dependencies..."
            export PATH="/home/azureuser/.local/share/fnm:$PATH"
            eval "$(/home/azureuser/.local/share/fnm/fnm env)"
            npm ci --omit=dev --ignore-scripts || npm install --omit=dev --ignore-scripts
            
            # Database migrations
            echo "🗃️ Running database migrations..."
            cd apps/api || cd /home/azureuser/smart-apply
            npx prisma generate --schema=/home/azureuser/smart-apply/prisma/schema.prisma || true
            npx prisma db push --schema=/home/azureuser/smart-apply/prisma/schema.prisma --skip-generate || true
            cd /home/azureuser/smart-apply
            
            # Restart services
            echo "🔄 Restarting services..."
            pm2 delete all 2>/dev/null || true
            pm2 start /home/azureuser/smart-apply/dist/apps/api/main.js --name "api" --cwd /home/azureuser/smart-apply/apps/api
            PORT=3001 pm2 start /home/azureuser/smart-apply/apps/web/.next/standalone/apps/web/server.js --name "web"
            pm2 save
            
            # Wait for API to be ready
            echo "⏳ Waiting for API..."
            sleep 10
            for i in {1..6}; do
              if curl -sf --max-time 5 http://localhost:3000/api/v1/health > /dev/null 2>&1; then
                echo "✅ API is healthy!"
                break
              fi
              sleep 5
            done
            
            pm2 status
            echo "✅ Deployment complete!"

      - name: Health Check (with retry)
        run: |
          echo "⏳ Verifying external health..."
          MAX_RETRIES=6
          RETRY_INTERVAL=10
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            if curl -sf --max-time 10 https://${{ env.VM_HOST }}/api/v1/health; then
              echo ""
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Service not ready, waiting ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed! Check the logs above."
