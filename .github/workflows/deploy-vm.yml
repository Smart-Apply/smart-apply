name: Deploy to Azure VM

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

# Only allow one deployment at a time
concurrency:
  group: deployment
  cancel-in-progress: false

env:
  VM_HOST: smartapplymvp.swedencentral.cloudapp.azure.com
  VM_USER: azureuser
  APP_DIR: /home/azureuser/smart-apply
  NODE_VERSION: '20'

jobs:
  # Build artifacts in CI (faster runners, cached)
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache node_modules directly for faster installs
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build all packages (parallel via turbo)
        run: npx turbo run build --concurrency=3

      - name: Type check API
        run: cd apps/api && npx tsc --noEmit

      # Create deployment artifact
      - name: Package artifacts
        run: |
          # Create artifact directory
          mkdir -p deploy-artifacts
          
          # Copy built API
          cp -r dist deploy-artifacts/
          
          # Copy Next.js standalone build with correct structure
          mkdir -p deploy-artifacts/web-standalone
          cp -r apps/web/.next/standalone/* deploy-artifacts/web-standalone/
          
          # Copy complete .next directory (all manifest files, BUILD_ID, static assets) into standalone structure
          mkdir -p deploy-artifacts/web-standalone/apps/web/.next
          # Copy all manifest and config files required by Next.js
          cp apps/web/.next/BUILD_ID deploy-artifacts/web-standalone/apps/web/.next/
          cp apps/web/.next/routes-manifest.json deploy-artifacts/web-standalone/apps/web/.next/
          cp apps/web/.next/prerender-manifest.json deploy-artifacts/web-standalone/apps/web/.next/
          cp apps/web/.next/required-server-files.json deploy-artifacts/web-standalone/apps/web/.next/
          cp apps/web/.next/build-manifest.json deploy-artifacts/web-standalone/apps/web/.next/
          cp apps/web/.next/app-path-routes-manifest.json deploy-artifacts/web-standalone/apps/web/.next/ || true
          # Copy static assets
          cp -r apps/web/.next/static deploy-artifacts/web-standalone/apps/web/.next/
          # Copy server directory
          cp -r apps/web/.next/server deploy-artifacts/web-standalone/apps/web/.next/
          
          # Copy public folder with verification
          mkdir -p deploy-artifacts/web-standalone/apps/web/public
          if [ -d "apps/web/public" ] && [ "$(ls -A apps/web/public)" ]; then
            cp -r apps/web/public/* deploy-artifacts/web-standalone/apps/web/public/
            echo "✅ Public folder copied ($(ls apps/web/public | wc -l) files)"
          else
            echo "⚠️  Warning: Public folder is empty or missing"
          fi
          
          # Verify structure
          echo "Verifying Next.js standalone structure:"
          ls -la deploy-artifacts/web-standalone/apps/web/
          echo ""
          echo "Verifying .next directory:"
          ls -la deploy-artifacts/web-standalone/apps/web/.next/
          echo ""
          echo "Verifying public directory:"
          ls -la deploy-artifacts/web-standalone/apps/web/public/
          
          # Copy Prisma files for migrations
          cp -r apps/api/prisma deploy-artifacts/prisma
          
          # Copy package files for reference
          cp package-lock.json deploy-artifacts/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy-artifacts/
          retention-days: 1
          compression-level: 9

  # Deploy pre-built artifacts to VM
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package
          path: deploy-artifacts/

      - name: Stream artifacts to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          script: |
            # Create temp directory on VM
            mkdir -p /tmp/deploy-extract
            rm -rf /tmp/deploy-extract/*

      - name: Copy artifacts using rsync over SSH
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Use rsync for efficient transfer (compressed, delta transfer)
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deploy-artifacts/ \
            ${{ env.VM_USER }}@${{ env.VM_HOST }}:/tmp/deploy-extract/
          
          # Cleanup key
          rm -f ~/.ssh/deploy_key

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          script: |
            set -e
            
            # Setup Node.js
            export PATH="/home/azureuser/.local/share/fnm:$PATH"
            eval "$(/home/azureuser/.local/share/fnm/fnm env)"
            
            cd /home/azureuser/smart-apply
            
            # Pull latest code (for config files, .env, etc.)
            echo "📦 Syncing code..."
            git fetch origin main --depth=1
            git reset --hard origin/main
            
            # Copy pre-built artifacts from temp location
            echo "📂 Copying build artifacts..."
            rm -rf dist
            cp -r /tmp/deploy-extract/dist .
            
            # Setup Next.js standalone (this contains the full standalone output)
            rm -rf apps/web/.next/standalone
            mkdir -p apps/web/.next
            cp -r /tmp/deploy-extract/web-standalone apps/web/.next/standalone
            
            # Check if node_modules needs update
            LOCK_HASH=$(md5sum package-lock.json | cut -d' ' -f1)
            CACHED_HASH=$(cat .npm-cache-hash 2>/dev/null || echo "")
            
            if [ "$LOCK_HASH" != "$CACHED_HASH" ]; then
              echo "📥 Dependencies changed, running npm ci..."
              npm ci --prefer-offline --no-audit --no-fund --ignore-scripts
              cd apps/api && npx prisma generate && cd ../..
              echo "$LOCK_HASH" > .npm-cache-hash
            fi
            
            # Database migrations (skip generate since we did it above or it's cached)
            echo "🗃️ Database migrations..."
            cd apps/api
            npx prisma db push --skip-generate --accept-data-loss 2>/dev/null || npx prisma db push --skip-generate
            cd ../..
            
            # Graceful restart (zero-downtime)
            echo "🔄 Restarting services..."
            
            # API restart
            if pm2 describe api > /dev/null 2>&1; then
              pm2 reload api --update-env
            else
              pm2 start dist/apps/api/main.js --name "api" --cwd /home/azureuser/smart-apply/apps/api
            fi
            
            # Web restart - verify server.js exists first
            # Note: Next.js standalone must be run from the standalone root directory
            WEB_STANDALONE_ROOT="/home/azureuser/smart-apply/apps/web/.next/standalone"
            WEB_SERVER_PATH="$WEB_STANDALONE_ROOT/apps/web/server.js"
            
            if [ ! -f "$WEB_SERVER_PATH" ]; then
              echo "❌ Error: server.js not found at $WEB_SERVER_PATH"
              echo "Directory listing:"
              ls -la "$WEB_STANDALONE_ROOT/apps/web" 2>/dev/null || echo "Directory does not exist"
              exit 1
            fi
            
            # Verify all required files are present before starting
            echo "🔍 Verifying deployment files..."
            [ -f "$WEB_STANDALONE_ROOT/apps/web/.next/BUILD_ID" ] && echo "✅ BUILD_ID" || echo "❌ BUILD_ID missing"
            [ -f "$WEB_STANDALONE_ROOT/apps/web/.next/routes-manifest.json" ] && echo "✅ routes-manifest.json" || echo "❌ routes-manifest.json missing"
            [ -d "$WEB_STANDALONE_ROOT/apps/web/public" ] && echo "✅ public directory" || echo "❌ public directory missing"
            
            pm2 delete web 2>/dev/null || true
            # Run from standalone root with environment variables
            cd "$WEB_STANDALONE_ROOT"
            NODE_ENV=production PORT=3001 NEXT_PUBLIC_API_URL=https://smartapplymvp.swedencentral.cloudapp.azure.com/api/v1 \
              pm2 start "apps/web/server.js" --name "web" --cwd "$WEB_STANDALONE_ROOT"
            
            pm2 save
            
            # Quick health check (API should be fast after reload)
            echo "⏳ Waiting for API..."
            for i in {1..4}; do
              if curl -sf --max-time 3 http://localhost:3000/api/v1/health > /dev/null 2>&1; then
                echo "✅ API is healthy!"
                break
              fi
              sleep 2
            done
            
            # Cleanup
            rm -rf /tmp/deploy-extract
            
            pm2 status
            echo "✅ Deployment complete!"

      - name: Health Check
        run: |
          echo "⏳ Verifying external health..."
          sleep 3
          for i in {1..4}; do
            if curl -sf --max-time 8 https://${{ env.VM_HOST }}/api/v1/health; then
              echo -e "\n✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i/4 - waiting 5s..."
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed! Check the logs above."
