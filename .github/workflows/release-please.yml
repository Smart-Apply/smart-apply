name: release-please
# Auto-generates a "Release PR" that bumps the root package.json version
# and updates CHANGELOG.md based on Conventional Commits since the last
# release. Merging that PR creates a Git tag (e.g. `v1.5.0`) which the
# regular Deploy workflow can later be wired to (Phase 4 of the DevOps
# roadmap).
#
# Conventional Commits cheat sheet:
#   feat:        → minor bump (1.4.0 → 1.5.0)
#   fix:         → patch bump (1.4.0 → 1.4.1)
#   feat!:       → major bump (1.4.0 → 2.0.0)
#   chore/docs:  → no bump (still appears in CHANGELOG under "Other")
#
# This workflow does NOT deploy. It only manages versioning + changelog.

on:
  push:
    branches: [main]

permissions:
  contents: write       # create tags, commits, releases
  pull-requests: write  # open the Release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Single-package monorepo: use one version for the whole repo.
          # Switch to `manifest` mode later if packages/shared needs
          # independent versioning. The package name is read from the
          # root package.json automatically.
          release-type: node
