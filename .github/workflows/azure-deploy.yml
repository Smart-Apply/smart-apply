name: Azure Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-smartapply-prod
  AZURE_CONTAINER_REGISTRY: acrsmartapplyprod
  AZURE_CONTAINER_APP: aca-smartapply-api
  IMAGE_NAME: smartapply-api

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"
          
          docker build -f infra/Dockerfile -t $IMAGE_TAG -t $IMAGE_LATEST --target production .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      - name: Run database migrations
        run: |
          # Run migrations in a temporary container or init container
          # This is a simplified example - in production you'd use Azure Container Instances or Jobs
          echo "Running database migrations..."
          # az container create \
          #   --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          #   --name migration-runner \
          #   --image ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          #   --restart-policy Never \
          #   --environment-variables DATABASE_URL='@Microsoft.KeyVault(VaultName=kv-smartapply;SecretName=database-url)' \
          #   --command-line "npx prisma migrate deploy"

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ env.AZURE_CONTAINER_APP }}
          imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          targetPort: 3000
          
      - name: Get Container App URL
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "Application deployed to: https://$APP_URL"
