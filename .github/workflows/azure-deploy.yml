name: Deploy to Azure

on:
  push:
    branches:
      - mvp
    paths:
      - 'apps/api/**'
      - 'infra/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/azure-deploy.yml'
  pull_request:
    branches:
      - mvp
    paths:
      - 'apps/api/**'
      - 'infra/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/azure-deploy.yml'
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  CONTAINER_APP_NAME: smartapply-dev-api
  RESOURCE_GROUP: smartapply-dev-rg
  IMAGE_NAME: smart-apply-api

permissions:
  id-token: write # Required for Azure OIDC authentication
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        run: |
          export DOCKER_BUILDKIT=1
          docker build \
            --platform linux/amd64 \
            --target production \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            -f infra/Dockerfile \
            .
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

  migrate-database:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Prisma migrations
        run: |
          # Get Database URL from Key Vault
          DATABASE_URL=$(az keyvault secret show \
            --name database-url \
            --vault-name smartapply-dev-vault \
            --query value -o tsv)
          
          # Install dependencies
          cd apps/api
          npm ci
          
          # Run migrations
          DATABASE_URL=$DATABASE_URL npx prisma migrate deploy
        env:
          DATABASE_URL: '' # Will be set from Key Vault

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: migrate-database
    
    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Health Check
        run: |
          echo "Testing health endpoint: ${{ steps.get-url.outputs.url }}/api/v1/health"
          
          # Wait for deployment to be ready (max 5 minutes)
          for i in {1..30}; do
            if curl -f -s "${{ steps.get-url.outputs.url }}/api/v1/health/live" > /dev/null; then
              echo "✅ Health check passed!"
              break
            fi
            echo "⏳ Waiting for deployment... ($i/30)"
            sleep 10
          done
          
          # Final health check
          curl -f -s "${{ steps.get-url.outputs.url }}/api/v1/health" | jq .
          
      - name: Test API Endpoints
        run: |
          # Test Swagger docs
          curl -f "${{ steps.get-url.outputs.url }}/docs" > /dev/null
          echo "✅ Swagger docs accessible"
          
          # Test health endpoints
          curl -f "${{ steps.get-url.outputs.url }}/api/v1/health/ready" > /dev/null
          echo "✅ Readiness check passed"

      - name: Notify on Slack (Optional)
        if: success()
        run: |
          echo "🚀 Deployment successful!!"
          echo "API URL: ${{ steps.get-url.outputs.url }}"
          echo "Swagger: ${{ steps.get-url.outputs.url }}/docs"
