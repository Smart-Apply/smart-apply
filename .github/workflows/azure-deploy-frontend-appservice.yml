name: Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - mvp
    paths:
      - 'apps/web/**'
      - '.github/workflows/azure-deploy-frontend-appservice.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: smartapply-dev-web
  AZURE_WEBAPP_PACKAGE_PATH: 'apps/web'
  NODE_VERSION: '20.x'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          npm ci

      - name: Build application
        run: |
          cd ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://smartapply-dev-api.ashycliff-786e35b4.northeurope.azurecontainerapps.io/api/v1

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Azure Logout
        run: az logout
        if: always()
