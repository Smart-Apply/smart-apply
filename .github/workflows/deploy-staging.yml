name: Deploy → Staging

# Auto-deploys to STAGING on every push to main. No approval gate —
# staging exists exactly so you can ship fast and watch what breaks.
#
# Triggers:
#   - push to main (after PR merge)
#   - manual via workflow_dispatch (re-deploy without code changes)
#
# Required GitHub Environment: `staging`
#   Secrets:
#     FLY_API_TOKEN          — scoped to smart-apply-api-staging only
#     CLOUDFLARE_API_TOKEN   — Worker:Edit, can be same as production
#     CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID (avoids /memberships lookup)
#   Variables:
#     STAGING_FLY_APP        — smart-apply-api-staging
#     STAGING_API_URL        — https://api-staging.smart-apply.io/api/v1
#     STAGING_HEALTH_HOST    — api-staging.smart-apply.io
#     STAGING_WEB_HOST       — staging.smart-apply.io
#     TURNSTILE_SITE_KEY     — public CAPTCHA site key
#     SENTRY_DSN_WEB         — public Sentry DSN

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

# Don't cancel an in-flight staging deploy when a second push lands —
# rolling-restart serializes them anyway and we want both to ship.
concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  STAGING_FLY_APP: ${{ vars.STAGING_FLY_APP || 'smart-apply-api-staging' }}
  # Custom domains (set up once in Fly + Cloudflare DNS — see
  # docs/guides/DOMAIN_CLOUDFLARE_SETUP.md). Override via repo Variables
  # to fall back to the *.fly.dev / *.workers.dev origins if needed.
  STAGING_API_URL: ${{ vars.STAGING_API_URL || 'https://api-staging.smart-apply.io/api/v1' }}
  STAGING_HEALTH_HOST: ${{ vars.STAGING_HEALTH_HOST || 'api-staging.smart-apply.io' }}
  STAGING_WEB_HOST: ${{ vars.STAGING_WEB_HOST || 'staging.smart-apply.io' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'infra/Dockerfile'
              - '.dockerignore'
              - 'fly.prod.toml'
              - 'fly.staging.toml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/deploy-staging.yml'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/deploy-staging.yml'

  # ─────────────────────────────────────────────────────────────────────
  # deploy-api — Push the API to smart-apply-api-staging Fly app.
  # Uses fly.staging.toml (smaller VM, suspend-on-idle).
  # ─────────────────────────────────────────────────────────────────────
  deploy-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # `staging` GitHub Environment — no required reviewers (auto-deploys).
    # Provides the staging-scoped FLY_API_TOKEN.
    environment: staging
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy staging API
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --app "${{ env.STAGING_FLY_APP }}" \
            --config fly.staging.toml \
            --remote-only \
            --strategy rolling \
            --wait-timeout 600

      - name: External health check
        run: |
          echo "⏳ Verifying https://${{ env.STAGING_HEALTH_HOST }}/api/v1/health..."
          # Staging runs with min_machines_running = 0 (suspend on idle).
          # First request after suspend triggers a cold start (~5-10 sec to
          # finish Nest bootstrap). The first curl with a 60s timeout acts
          # as the wake-up call; subsequent polls measure actual readiness.
          echo "→ Wake-up request (long timeout to absorb cold start)…"
          curl -s -o /dev/null -w "  wake-up returned HTTP %{http_code} in %{time_total}s\n" \
            --max-time 60 "https://${{ env.STAGING_HEALTH_HOST }}/api/v1/health" || true

          # Now poll for readiness. 12 attempts × 5s = up to 60s total.
          for i in {1..12}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "https://${{ env.STAGING_HEALTH_HOST }}/api/v1/health")
            if [ "$code" = "200" ]; then
              echo "✅ Staging API healthy"
              exit 0
            fi
            echo "Attempt $i/12 — got $code, waiting 5s…"
            sleep 5
          done
          echo "❌ Staging API health check failed"
          exit 1

      - name: Show recent Fly logs on failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "=== Last 100 log lines ==="
          flyctl logs --app "${{ env.STAGING_FLY_APP }}" --no-tail 2>&1 | tail -100 || true
          echo "=== Machine status ==="
          flyctl status --app "${{ env.STAGING_FLY_APP }}" 2>&1 || true

  # ─────────────────────────────────────────────────────────────────────
  # deploy-web — Push the Worker to smart-apply-web-staging.
  # Uses wrangler.jsonc env.staging block; bakes staging API URL into bundle.
  # ─────────────────────────────────────────────────────────────────────
  deploy-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          # Node 24 to match the API workflow + satisfy pnpm 11's >=22.13
          # requirement. The Cloudflare Workers RUNTIME version is set in
          # apps/web/wrangler.jsonc via compatibility_date and is independent
          # of the host Node used to build the bundle.
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @smart-apply/web... --filter @smart-apply/shared...

      - name: Build shared package
        run: pnpm shared:build

      - name: Build + deploy Worker (staging)
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # NEXT_PUBLIC_* values are inlined at build time. Staging URL
          # comes from the GitHub Environment variable.
          NEXT_PUBLIC_API_URL: ${{ env.STAGING_API_URL }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ vars.SENTRY_DSN_WEB }}
          NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
        run: pnpm --filter @smart-apply/web cf:deploy:staging

      - name: Smoke test deployed Worker
        run: |
          echo "⏳ Verifying https://${{ env.STAGING_WEB_HOST }}/register..."
          # Cloudflare propagates the custom-domain DNS + cert within ~30s
          # of `wrangler deploy` on a zone we already own. Give it a beat.
          sleep 10
          for i in {1..6}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "https://${{ env.STAGING_WEB_HOST }}/register")
            if [ "$code" = "200" ]; then
              echo "✅ Staging Worker /register returned 200"
              exit 0
            fi
            echo "Attempt $i/6 — got $code, waiting 5s…"
            sleep 5
          done
          echo "❌ Staging Worker did not return 200"
          exit 1
