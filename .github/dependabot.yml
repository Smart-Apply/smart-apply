# Dependabot configuration — automated dependency update PRs.
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Why a SINGLE root npm block (and not one per workspace):
#   pnpm workspaces keep a single `pnpm-lock.yaml` at the repo root.
#   Dependabot only updates files BELOW its `directory:` setting, so a
#   `directory: /apps/web` block would bump `apps/web/package.json` but
#   leave the root lockfile untouched → CI fails with "lock file out of
#   sync". The `directory: /` block discovers all workspaces via the
#   pnpm-workspace.yaml manifest and produces atomic PRs that touch the
#   right workspace package.json AND the root lockfile.
#
#   Dependabot's `package-ecosystem: npm` does understand pnpm-lock.yaml
#   (GitHub added native support in Sept 2024). The ecosystem name stays
#   `npm` even when the lockfile is `pnpm-lock.yaml`.
#
# Strategy:
#   • Group non-major bumps by ecosystem family so the review queue
#     stays manageable (one Tailwind patch + one Prisma patch + one
#     shadcn patch = 1 PR per family, not 3).
#   • Major bumps stay individual — they're the ones that break things.
#   • Dependabot security updates (Settings → Code security) run
#     independently of this file and ALWAYS open immediately.

version: 2
updates:
  # ───────────────────────────────────────────────────────────────────
  # All pnpm workspaces (root + apps/api + apps/web + packages/shared).
  # Discovered automatically because the root pnpm-workspace.yaml
  # declares `packages: ['apps/*', 'packages/*']`.
  # ───────────────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    labels:
      - dependencies
    groups:
      # Backend ecosystem families
      api-nest:
        patterns:
          - '@nestjs/*'
          - 'nestjs-*'
        update-types: [minor, patch]
      api-prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
        update-types: [minor, patch]
      api-azure:
        patterns:
          - '@azure/*'
        update-types: [minor, patch]
      api-aws:
        patterns:
          - '@aws-sdk/*'
        update-types: [minor, patch]

      # Frontend ecosystem families
      web-radix:
        patterns:
          - '@radix-ui/*'
        update-types: [minor, patch]
      web-tanstack:
        patterns:
          - '@tanstack/*'
        update-types: [minor, patch]
      web-cloudflare:
        patterns:
          - '@opennextjs/*'
          - 'wrangler'
        update-types: [minor, patch]

      # Shared dev tooling (eslint, prettier, jest, ts-*, types/*…)
      dev-tooling:
        dependency-type: development
        update-types: [minor, patch]

      # Catch-all for anything not matched above (lucide, sonner, axios…)
      misc:
        update-types: [minor, patch]

    ignore:
      # Major bumps that historically break and need coordinated work.
      - dependency-name: '@nestjs/*'
        update-types: [version-update:semver-major]
      - dependency-name: 'prisma'
        update-types: [version-update:semver-major]
      - dependency-name: '@prisma/*'
        update-types: [version-update:semver-major]
      - dependency-name: 'puppeteer'
        update-types: [version-update:semver-major]
      - dependency-name: 'playwright'
        update-types: [version-update:semver-major]
      - dependency-name: 'next'
        update-types: [version-update:semver-major]
      - dependency-name: 'react'
        update-types: [version-update:semver-major]
      - dependency-name: 'react-dom'
        update-types: [version-update:semver-major]
      - dependency-name: 'tailwindcss'
        update-types: [version-update:semver-major]
      - dependency-name: 'typescript'
        update-types: [version-update:semver-major]
      - dependency-name: 'turbo'
        update-types: [version-update:semver-major]
      # @types/node majors track Node LTS — bump deliberately when you
      # bump the runtime.
      - dependency-name: '@types/node'
        update-types: [version-update:semver-major]
      # ESLint v10 dropped support for the legacy .eslintrc format and
      # tightened several rule defaults. Bump deliberately when ready to
      # migrate ALL workspaces' configs simultaneously.
      - dependency-name: 'eslint'
        update-types: [version-update:semver-major]
      - dependency-name: 'eslint-config-next'
        update-types: [version-update:semver-major]
      # lucide-react v1.0 removed all third-party brand icons (LinkedIn,
      # GitHub, Twitter, etc.) for trademark reasons. Migration requires
      # replacing each brand-icon import with custom SVGs or a different
      # icon set — bump deliberately when you've planned the migration.
      - dependency-name: 'lucide-react'
        update-types: [version-update:semver-major]

  # ───────────────────────────────────────────────────────────────────
  # GitHub Actions workflow versions (actions/checkout, setup-node, etc.)
  # ───────────────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - ci
    groups:
      gh-actions:
        update-types: [minor, patch]

  # ───────────────────────────────────────────────────────────────────
  # Docker base images (infra/Dockerfile)
  # ───────────────────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker
