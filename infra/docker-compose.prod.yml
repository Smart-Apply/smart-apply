version: '3.8'

services:
  api:
    image: smartapply-api:latest
    container_name: smartapply-api
    restart: unless-stopped
    env_file:
      - /home/azureuser/smart-apply/apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - /home/azureuser/smart-apply/storage:/app/storage
      - /home/azureuser/smart-apply/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    image: smartapply-web:latest
    container_name: smartapply-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: "0.0.0.0"
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
