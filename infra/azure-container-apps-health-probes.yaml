# ==============================================================================
# Health Endpoints Summary
# ==============================================================================
#
# Endpoint             | Purpose                      | Used For
# ---------------------|------------------------------|----------------------
# /api/v1/health       | Full system health check     | Monitoring dashboards
# /api/v1/health/live  | Basic app alive check        | Liveness probe
# /api/v1/health/ready | Dependencies ready check     | Readiness probe
# /api/v1/health/details | Detailed metrics with timing | Debugging/monitoring
#
# Response Codes:
# - 200: Healthy/Ready
# - 503: Unhealthy/Not Ready

# ==============================================================================
# Best Practices
# ==============================================================================
#
# 1. Liveness Probe:
#    - Should be FAST and SIMPLE (just check if app is running)
#    - Don't check external dependencies (avoid cascading failures)
#    - Use /health/live endpoint
#
# 2. Readiness Probe:
#    - CAN check critical dependencies (database, storage)
#    - Use /health/ready endpoint
#    - More frequent checks than liveness
#
# 3. Startup Probe:
#    - Use for slow-starting applications
#    - Prevents premature restarts during startup
#    - Disables liveness/readiness until startup succeeds
#
# 4. General:
#    - Health endpoints should respond in < 500ms
#    - Set appropriate timeouts based on actual response times
#    - Test probe behavior with dependency failures
